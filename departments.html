<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP College ERP - Academic Departments Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="main-content-wrapper">
    <div class="page-header-title">
      <h2><i class="fa-solid fa-building-columns" style="color: var(--primary);"></i> Academic Departments Management</h2>
      <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
        <button id="exportDeptsBtn" class="btn-secondary"><i class="fa-solid fa-file-excel"></i> Export Departments</button>
        <button id="openAddDeptModalBtn" class="btn-primary" style="display:none;"><i class="fa-solid fa-plus-circle"></i> Create New Department</button>
      </div>
    </div>

    <!-- Departments Grid -->
    <div id="departmentsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.25rem;">
      <!-- Dynamic department cards -->
    </div>
  </main>

  <!-- Add/Edit Department Modal -->
  <div class="modal-overlay" id="deptModal">
    <div class="modal-box" style="max-width: 650px;">
      <div class="modal-header">
        <h3 id="deptModalTitle"><i class="fa-solid fa-building-columns" style="color: var(--primary);"></i> Add New Department</h3>
        <button class="close-modal-btn" id="closeDeptModalBtn">&times;</button>
      </div>
      <form id="deptForm">
        <input type="hidden" id="editDeptDbId">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Department Code *</label>
            <input type="text" id="deptCodeInput" class="form-control" placeholder="e.g. AI & DS" required>
          </div>
          <div class="form-group">
            <label class="form-label">Department Name *</label>
            <input type="text" id="deptNameInput" class="form-control" placeholder="e.g. Artificial Intelligence & Data Science" required>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Head of Department (HOD) *</label>
            <input type="text" id="deptHodInput" class="form-control" placeholder="e.g. Dr. M. Senthil Kumar" required>
          </div>
          <div class="form-group">
            <label class="form-label">Established Year</label>
            <input type="text" id="deptYearInput" class="form-control" placeholder="e.g. 2021">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Department Description</label>
          <textarea id="deptDescInput" class="form-control" rows="3" placeholder="Overview of curriculum, research areas, and specializations..."></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Assign Faculty Members (Comma Separated)</label>
          <input type="text" id="deptFacultyInput" class="form-control" placeholder="Dr. M. Senthil Kumar, Prof. Anitha Raj">
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem;">
          <i class="fa-solid fa-save"></i> Save Department Record
        </button>
      </form>
    </div>
  </div>

  <footer>
    &copy; 2026 J.P. College of Engineering. All rights reserved. Department Management ERP System.
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/export.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('jp_dms_user')) || {};
      const isAdmin = user.role === 'admin' || user.role === 'super_admin';

      if (isAdmin) {
        document.getElementById('openAddDeptModalBtn').style.display = 'inline-flex';
      }

      let deptsList = [];
      const modal = document.getElementById('deptModal');

      document.getElementById('openAddDeptModalBtn')?.addEventListener('click', () => {
        document.getElementById('editDeptDbId').value = '';
        document.getElementById('deptModalTitle').innerHTML = '<i class="fa-solid fa-building-columns" style="color: var(--primary);"></i> Add New Department';
        document.getElementById('deptForm').reset();
        modal.classList.add('active');
      });

      document.getElementById('closeDeptModalBtn')?.addEventListener('click', () => modal.classList.remove('active'));

      const fetchDepartments = async () => {
        const grid = document.getElementById('departmentsGrid');
        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--text-muted);"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><p style="margin-top:0.5rem;">Loading departments...</p></div>';

        try {
          const baseUrl = window.APP_CONFIG.getApiBaseUrl();
          const res = await fetch(`${baseUrl}/departments`);
          const json = await res.json();
          deptsList = json.data || [];

          if (deptsList.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:3rem; background:#FFF; border-radius:12px; border:1px solid var(--border-subtle);"><i class="fa-solid fa-building-columns fa-3x" style="color:var(--primary);"></i><h3 style="margin-top:1rem; color:#1E3A8A;">No Departments Configured</h3></div>';
            return;
          }

          grid.innerHTML = deptsList.map(d => {
            const code = d.departmentCode || d.code || 'DEPT';
            const name = d.departmentName || d.name || 'Department';
            const hod = d.hod || d.hodName || 'Dr. Head of Dept';
            const created = new Date(d.createdAt || Date.now()).toLocaleDateString();

            return `
              <div class="card-glass" style="display:flex; flex-direction:column; justify-content:space-between; border-top: 4px solid var(--primary);">
                <div>
                  <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.75rem;">
                    <span class="badge badge-primary" style="font-size:0.85rem; font-weight:800;">${code}</span>
                    <span class="badge badge-gold" style="font-size:0.75rem;">Est. ${d.establishedYear || '2010'}</span>
                  </div>

                  <h3 style="font-size:1.15rem; font-weight:800; color:#1E3A8A; margin-bottom:0.4rem;">${name}</h3>
                  <p style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:1rem; line-height:1.4;">${d.description || 'Department offering undergraduate engineering programs.'}</p>

                  <div style="font-size:0.825rem; color:var(--text-secondary); background:#F8FAFC; padding:0.75rem; border-radius:8px; border:1px solid var(--border-subtle); margin-bottom:1rem;">
                    <div style="margin-bottom:0.25rem;"><i class="fa-solid fa-user-tie" style="color:var(--primary);"></i> HOD: <strong style="color:#1E3A8A;">${hod}</strong></div>
                    <div style="display:flex; justify-content:space-between; margin-top:0.5rem; border-top:1px solid var(--border-subtle); padding-top:0.4rem;">
                      <div><i class="fa-solid fa-chalkboard-user" style="color:var(--primary);"></i> Faculty: <strong>${d.facultyCount || 8}</strong></div>
                      <div><i class="fa-solid fa-user-graduate" style="color:var(--primary);"></i> Students: <strong>${d.studentCount || 120}</strong></div>
                    </div>
                  </div>
                </div>

                <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border-subtle); padding-top:0.75rem; font-size:0.75rem; color:var(--text-muted);">
                  <span>Created: ${created}</span>
                  <div style="display:flex; gap:0.4rem;">
                    ${isAdmin ? `<button onclick="editDepartment('${d._id}')" class="btn-secondary" style="padding:0.35rem 0.65rem;" title="Edit Department"><i class="fa-solid fa-pen"></i> Edit</button>` : ''}
                    ${isAdmin ? `<button onclick="deleteDepartment('${d._id}', '${name}')" class="btn-danger" style="padding:0.35rem 0.65rem;" title="Delete Department"><i class="fa-solid fa-trash"></i></button>` : ''}
                  </div>
                </div>
              </div>
            `;
          }).join('');

        } catch (err) {
          grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--error);">Failed to load departments.</div>';
        }
      };

      document.getElementById('deptForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('editDeptDbId').value;
        const assignedFac = document.getElementById('deptFacultyInput').value.split(',').map(x => x.trim()).filter(Boolean);

        const payload = {
          departmentCode: document.getElementById('deptCodeInput').value,
          departmentName: document.getElementById('deptNameInput').value,
          hod: document.getElementById('deptHodInput').value,
          establishedYear: document.getElementById('deptYearInput').value,
          description: document.getElementById('deptDescInput').value,
          assignedFaculty: assignedFac
        };

        const baseUrl = window.APP_CONFIG.getApiBaseUrl();
        const token = localStorage.getItem('jp_dms_token');
        const url = id ? `${baseUrl}/departments/${id}` : `${baseUrl}/departments`;
        const method = id ? 'PUT' : 'POST';

        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        alert(data.message || 'Department record saved!');
        modal.classList.remove('active');
        fetchDepartments();
      });

      window.editDepartment = (id) => {
        const d = deptsList.find(x => x._id === id);
        if (!d) return;

        document.getElementById('editDeptDbId').value = d._id;
        document.getElementById('deptCodeInput').value = d.departmentCode || d.code || '';
        document.getElementById('deptNameInput').value = d.departmentName || d.name || '';
        document.getElementById('deptHodInput').value = d.hod || d.hodName || '';
        document.getElementById('deptYearInput').value = d.establishedYear || '2010';
        document.getElementById('deptDescInput').value = d.description || '';
        document.getElementById('deptFacultyInput').value = (d.assignedFaculty || []).join(', ');

        document.getElementById('deptModalTitle').innerHTML = '<i class="fa-solid fa-pen" style="color: var(--primary);"></i> Edit Department Record';
        modal.classList.add('active');
      };

      window.deleteDepartment = async (id, name) => {
        const confirmation = prompt(`⚠️ CAUTION: Deleting department "${name}" will remove associated department records.\n\nTo confirm deletion, type "${name}" below:`);
        if (confirmation !== name) {
          alert('Deletion cancelled: Department name did not match.');
          return;
        }

        try {
          const baseUrl = window.APP_CONFIG.getApiBaseUrl();
          const token = localStorage.getItem('jp_dms_token');
          const res = await fetch(`${baseUrl}/departments/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const json = await res.json();
          if (res.ok && json.success !== false) {
            alert(json.message || `Department "${name}" deleted.`);
            fetchDepartments();
          } else {
            alert(`Delete Failed: ${json?.message || json?.error || 'Deletion failed.'}`);
          }
        } catch (e) {
          alert(`Delete Error: ${e.message}`);
        }
      };

      document.getElementById('exportDeptsBtn').addEventListener('click', () => {
        if (!deptsList.length) return alert('No department data to export.');
        exporter.exportToExcel('JP_College_Departments', deptsList);
      });

      fetchDepartments();
    });
  </script>
</body>
</html>
