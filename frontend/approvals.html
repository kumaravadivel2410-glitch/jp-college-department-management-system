<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP College ERP - Super Admin User Approvals</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="main-content-wrapper">
    <div class="page-header-title">
      <h2><i class="fa-solid fa-user-check" style="color: var(--primary);"></i> Super Admin Registration Approvals</h2>
      <span class="badge badge-primary" id="totalPendingBadge" style="font-size: 0.9rem;">0 Pending Requests</span>
    </div>

    <!-- 3 Tabs Group -->
    <div class="role-tab-group" id="approvalTabGroup" style="max-width: 600px; margin-bottom: 1.5rem;">
      <button class="role-tab-btn active" data-tab="students">
        <i class="fa-solid fa-user-graduate"></i> Pending Students <span id="countStudentsBadge" class="badge badge-warning" style="margin-left: 0.3rem;">0</span>
      </button>
      <button class="role-tab-btn" data-tab="faculty">
        <i class="fa-solid fa-chalkboard-user"></i> Pending Faculty <span id="countFacultyBadge" class="badge badge-warning" style="margin-left: 0.3rem;">0</span>
      </button>
      <button class="role-tab-btn" data-tab="admin">
        <i class="fa-solid fa-user-shield"></i> Pending Admin Requests <span id="countAdminBadge" class="badge badge-warning" style="margin-left: 0.3rem;">0</span>
      </button>
    </div>

    <!-- Requests Container Grid -->
    <div id="approvalRequestsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.25rem;">
      <!-- Dynamic Pending Request Cards -->
    </div>
  </main>

  <footer>
    &copy; 2026 J.P. College of Engineering. All rights reserved. Department Management ERP System.
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let activeTab = 'students';
      let pendingData = { students: [], faculty: [], adminRequests: [] };

      const tabBtns = document.querySelectorAll('#approvalTabGroup .role-tab-btn');
      tabBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          tabBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeTab = btn.dataset.tab;
          renderTabContent();
        });
      });

      const fetchPendingRequests = async () => {
        const grid = document.getElementById('approvalRequestsGrid');
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted);"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><p style="margin-top:0.5rem;">Loading pending approval requests...</p></div>';

        try {
          const baseUrl = window.APP_CONFIG.getApiBaseUrl();
          const token = localStorage.getItem('jp_dms_token');
          const res = await fetch(`${baseUrl}/auth/pending-categorized`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });

          const json = await res.json();
          if (json.success) {
            pendingData = json.data;
            
            document.getElementById('totalPendingBadge').textContent = `${json.counts.total} Pending Requests`;
            document.getElementById('countStudentsBadge').textContent = json.counts.students;
            document.getElementById('countFacultyBadge').textContent = json.counts.faculty;
            document.getElementById('countAdminBadge').textContent = json.counts.adminRequests;

            renderTabContent();
          }
        } catch (err) {
          grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--error); padding: 2rem;">Error loading pending requests.</div>`;
        }
      };

      const renderTabContent = () => {
        const grid = document.getElementById('approvalRequestsGrid');
        const list = activeTab === 'students' ? pendingData.students : (activeTab === 'faculty' ? pendingData.faculty : pendingData.adminRequests);

        if (list.length === 0) {
          grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem; background: #FFF; border-radius: 12px; border: 1px solid #E2E8F0;"><i class="fa-solid fa-circle-check fa-3x" style="color: var(--success);"></i><h3 style="margin-top: 1rem; color: #1E293B;">No Pending Requests</h3><p style="color: var(--text-secondary); font-size: 0.9rem;">There are no pending ${activeTab} registration requests to review.</p></div>`;
          return;
        }

        grid.innerHTML = list.map(req => {
          const photoUrl = req.photo || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150&auto=format&fit=crop&q=80';
          const regDate = new Date(req.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

          let extraInfo = '';
          if (req.role === 'student') {
            extraInfo = `Reg No: <strong>${req.registerNo || 'N/A'}</strong> | ${req.year || 'III Year'} (${req.semester || 'Sem V'})`;
          } else if (req.role === 'faculty') {
            extraInfo = `Faculty ID: <strong>${req.facultyId || 'N/A'}</strong> | ${req.designation || 'Faculty'}`;
          } else {
            extraInfo = `Employee ID: <strong>${req.employeeId || 'N/A'}</strong><br>Reason: <em>"${req.reasonForAdmin || 'Admin access requested'}"</em>`;
          }

          return `
            <div class="card-glass" style="display: flex; flex-direction: column; justify-content: space-between;">
              <div>
                <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;">
                  <img src="${photoUrl}" alt="${req.name}" style="width: 54px; height: 54px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary);">
                  <div>
                    <h3 style="font-size: 1.1rem; font-weight: 700; color: #1E293B; margin-bottom: 0.15rem;">${req.name}</h3>
                    <div style="font-size: 0.8rem; color: var(--text-secondary);">${req.email}</div>
                    <span class="badge badge-warning" style="margin-top: 0.25rem;">Status: Pending Approval</span>
                  </div>
                </div>

                <div style="font-size: 0.825rem; color: var(--text-secondary); background: #F8FAFC; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; border: 1px solid #F1F5F9;">
                  <div>Department: <strong>${req.department}</strong></div>
                  <div>Submitted On: <strong>${regDate}</strong></div>
                  <div style="margin-top: 0.35rem;">${extraInfo}</div>
                </div>
              </div>

              <div style="display: flex; gap: 0.5rem; border-top: 1px solid #F1F5F9; padding-top: 0.85rem;">
                <button onclick="approveRequest('${req._id}', '${req.name}')" class="btn-success" style="flex: 1; justify-content: center; padding: 0.5rem; font-size: 0.85rem;">
                  <i class="fa-solid fa-check"></i> Approve
                </button>

                <button onclick="rejectRequest('${req._id}', '${req.name}')" class="btn-secondary" style="flex: 1; justify-content: center; padding: 0.5rem; font-size: 0.85rem; color: var(--warning);" title="Reject Request">
                  <i class="fa-solid fa-xmark"></i> Reject
                </button>

                <button onclick="deleteRequest('${req._id}', '${req.name}')" class="btn-danger" style="padding: 0.5rem 0.75rem;" title="Delete Request">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </div>
            </div>
          `;
        }).join('');
      };

      // Action Handlers
      window.approveRequest = async (id, name) => {
        if (!confirm(`Approve registration request for ${name}?`)) return;
        try {
          const baseUrl = window.APP_CONFIG.getApiBaseUrl();
          const token = localStorage.getItem('jp_dms_token');
          const res = await fetch(`${baseUrl}/auth/approve/${id}`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const json = await res.json();
          alert(json.message || `Account for ${name} approved!`);
          fetchPendingRequests();
        } catch (e) {
          alert('Failed to approve request.');
        }
      };

      window.rejectRequest = async (id, name) => {
        if (!confirm(`Reject registration request for ${name}?`)) return;
        try {
          const baseUrl = window.APP_CONFIG.getApiBaseUrl();
          const token = localStorage.getItem('jp_dms_token');
          const res = await fetch(`${baseUrl}/auth/reject/${id}`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const json = await res.json();
          alert(json.message || `Registration for ${name} rejected.`);
          fetchPendingRequests();
        } catch (e) {
          alert('Failed to reject request.');
        }
      };

      window.deleteRequest = async (id, name) => {
        if (!confirm(`Permanently delete registration record for ${name}?`)) return;
        try {
          const baseUrl = window.APP_CONFIG.getApiBaseUrl();
          const token = localStorage.getItem('jp_dms_token');
          const res = await fetch(`${baseUrl}/users/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const json = await res.json();
          alert(json.message || 'Record deleted successfully.');
          fetchPendingRequests();
        } catch (e) {
          alert('Failed to delete request.');
        }
      };

      fetchPendingRequests();
    });
  </script>
</body>
</html>
