<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP College ERP - Department-wise Class Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="main-content-wrapper">
    <div class="page-header-title">
      <h2><i class="fa-solid fa-door-open" style="color: var(--primary);"></i> Department-Wise Classes & Advisors</h2>
      <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
        <button id="exportClassesBtn" class="btn-secondary"><i class="fa-solid fa-file-excel"></i> Export Classes</button>
        <button id="openAddClassModalBtn" class="btn-primary" style="display:none;"><i class="fa-solid fa-plus-circle"></i> Create New Class</button>
      </div>
    </div>

    <!-- Filter Bar with Dynamic Year -> Semester Cascading -->
    <div class="card-glass" style="margin-bottom: 1.5rem;">
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 1rem;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Department Filter</label>
          <select id="clsFilterDept" class="form-control">
            <option value="All">All Departments</option>
            <option value="AI & DS" selected>AI & DS</option>
            <option value="CSE">CSE</option>
            <option value="ECE">ECE</option>
            <option value="EEE">EEE</option>
            <option value="Mechanical">Mechanical</option>
            <option value="Civil">Civil</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Year Filter</label>
          <select id="clsFilterYear" class="form-control">
            <option value="I Year">I Year</option>
            <option value="II Year">II Year</option>
            <option value="III Year" selected>III Year</option>
            <option value="IV Year">IV Year</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Semester (Cascading)</label>
          <select id="clsFilterSem" class="form-control">
            <!-- Dynamic Cascading Options -->
          </select>
        </div>
      </div>
    </div>

    <!-- Classes Grid -->
    <div id="classesGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.25rem;">
      <!-- Dynamic Class Cards -->
    </div>
  </main>

  <!-- Add/Edit Class Modal -->
  <div class="modal-overlay" id="classModal">
    <div class="modal-box" style="max-width: 650px;">
      <div class="modal-header">
        <h3 id="classModalTitle"><i class="fa-solid fa-door-open" style="color: var(--primary);"></i> Create New Class</h3>
        <button class="close-modal-btn" id="closeClassModalBtn">&times;</button>
      </div>
      <form id="classForm">
        <input type="hidden" id="editClassDbId">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Class Name *</label>
            <input type="text" id="clsNameInput" class="form-control" placeholder="III Year AI & DS - Sec A" required>
          </div>
          <div class="form-group">
            <label class="form-label">Department *</label>
            <select id="clsDeptInput" class="form-control">
              <option value="AI & DS">AI & DS</option>
              <option value="CSE">CSE</option>
              <option value="ECE">ECE</option>
              <option value="EEE">EEE</option>
              <option value="Mechanical">Mechanical</option>
              <option value="Civil">Civil</option>
            </select>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Year *</label>
            <select id="clsYearInput" class="form-control">
              <option value="I Year">I Year</option>
              <option value="II Year">II Year</option>
              <option value="III Year" selected>III Year</option>
              <option value="IV Year">IV Year</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Semester *</label>
            <select id="clsSemInput" class="form-control">
              <!-- Dynamic Cascading Options -->
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Section *</label>
            <select id="clsSecInput" class="form-control">
              <option value="A">Section A</option>
              <option value="B">Section B</option>
              <option value="C">Section C</option>
            </select>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Class Advisor Name</label>
            <input type="text" id="clsAdvisorInput" class="form-control" placeholder="Dr. M. Senthil Kumar">
          </div>
          <div class="form-group">
            <label class="form-label">Room Number</label>
            <input type="text" id="clsRoomInput" class="form-control" placeholder="LH-204 / Lab 3">
          </div>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem;">
          <i class="fa-solid fa-save"></i> Save Class Configuration
        </button>
      </form>
    </div>
  </div>

  <footer>
    &copy; 2026 J.P. College of Engineering. All rights reserved. Department Management ERP System.
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/export.js"></script>
  <script src="js/semester-cascader.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Bind Dynamic Year -> Semester Cascading
      window.bindYearSemesterCascading(document.getElementById('clsFilterYear'), document.getElementById('clsFilterSem'), true);
      window.bindYearSemesterCascading(document.getElementById('clsYearInput'), document.getElementById('clsSemInput'), false);

      const user = JSON.parse(localStorage.getItem('jp_dms_user')) || {};
      const isFacultyOrAdmin = user.role === 'faculty' || user.role === 'admin' || user.role === 'super_admin';

      if (isFacultyOrAdmin) {
        document.getElementById('openAddClassModalBtn').style.display = 'inline-flex';
      }

      let classesList = [];
      const modal = document.getElementById('classModal');

      document.getElementById('openAddClassModalBtn')?.addEventListener('click', () => {
        document.getElementById('editClassDbId').value = '';
        document.getElementById('classModalTitle').innerHTML = '<i class="fa-solid fa-door-open" style="color: var(--primary);"></i> Create New Class';
        document.getElementById('classForm').reset();
        window.bindYearSemesterCascading(document.getElementById('clsYearInput'), document.getElementById('clsSemInput'), false);
        modal.classList.add('active');
      });

      document.getElementById('closeClassModalBtn')?.addEventListener('click', () => modal.classList.remove('active'));

      const fetchClasses = async () => {
        const grid = document.getElementById('classesGrid');
        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--text-muted);"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><p style="margin-top:0.5rem;">Loading classes...</p></div>';

        const dept = document.getElementById('clsFilterDept').value;
        const year = document.getElementById('clsFilterYear').value;
        const sem = document.getElementById('clsFilterSem').value;

        try {
          const baseUrl = window.APP_CONFIG.getApiBaseUrl();
          const query = `?department=${encodeURIComponent(dept)}&year=${encodeURIComponent(year)}&semester=${encodeURIComponent(sem)}`;
          const res = await fetch(`${baseUrl}/classes${query}`);
          const json = await res.json();
          classesList = json.data || [];

          if (classesList.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:3rem; background:#FFF; border-radius:12px; border:1px solid var(--border-subtle);"><i class="fa-solid fa-door-open fa-3x" style="color:var(--primary);"></i><h3 style="margin-top:1rem; color:#1E3A8A;">No Classes Configured</h3></div>';
            return;
          }

          grid.innerHTML = classesList.map(c => `
            <div class="card-glass" style="display:flex; flex-direction:column; justify-content:space-between; border-left:4px solid var(--primary);">
              <div>
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.75rem;">
                  <span class="badge badge-primary" style="font-weight:800;">${c.department}</span>
                  <span class="badge badge-gold">Sec ${c.section || 'A'}</span>
                </div>

                <h3 style="font-size:1.15rem; font-weight:800; color:#1E3A8A; margin-bottom:0.5rem;">${c.className}</h3>
                
                <div style="font-size:0.85rem; color:var(--text-secondary); background:#F8FAFC; padding:0.75rem; border-radius:8px; border:1px solid var(--border-subtle); margin-bottom:1rem;">
                  <div style="margin-bottom:0.35rem;"><i class="fa-solid fa-chalkboard-user" style="color:var(--primary);"></i> Advisor: <strong style="color:#1E3A8A;">${c.classAdvisor || 'Dr. Faculty Advisor'}</strong></div>
                  <div style="margin-bottom:0.35rem;"><i class="fa-solid fa-location-dot" style="color:var(--primary);"></i> Room No: <strong>${c.roomNumber || 'LH-201'}</strong></div>
                  <div><i class="fa-solid fa-layer-group" style="color:var(--primary);"></i> Academic Year: <strong>${c.year} (${c.semester})</strong></div>
                </div>
              </div>

              <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border-subtle); padding-top:0.75rem;">
                <a href="attendance.html" class="btn-secondary" style="font-size:0.75rem; padding:0.35rem 0.65rem;"><i class="fa-solid fa-calendar-check"></i> Attendance</a>
                <div style="display:flex; gap:0.4rem;">
                  ${isFacultyOrAdmin ? `<button onclick="editClass('${c._id}')" class="btn-secondary" style="padding:0.35rem 0.65rem;" title="Edit Class"><i class="fa-solid fa-pen"></i></button>` : ''}
                  ${isFacultyOrAdmin ? `<button onclick="deleteClass('${c._id}')" class="btn-danger" style="padding:0.35rem 0.65rem;" title="Delete Class"><i class="fa-solid fa-trash"></i></button>` : ''}
                </div>
              </div>
            </div>
          `).join('');

        } catch (err) {
          grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--error);">Failed to load classes.</div>';
        }
      };

      document.querySelectorAll('#clsFilterDept, #clsFilterYear, #clsFilterSem').forEach(el => el.addEventListener('change', fetchClasses));

      document.getElementById('classForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('editClassDbId').value;
        const payload = {
          className: document.getElementById('clsNameInput').value,
          department: document.getElementById('clsDeptInput').value,
          year: document.getElementById('clsYearInput').value,
          semester: document.getElementById('clsSemInput').value,
          section: document.getElementById('clsSecInput').value,
          classAdvisor: document.getElementById('clsAdvisorInput').value,
          roomNumber: document.getElementById('clsRoomInput').value
        };

        const baseUrl = window.APP_CONFIG.getApiBaseUrl();
        const token = localStorage.getItem('jp_dms_token');
        const url = id ? `${baseUrl}/classes/${id}` : `${baseUrl}/classes`;
        const method = id ? 'PUT' : 'POST';

        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        alert(data.message || 'Class configuration saved!');
        modal.classList.remove('active');
        fetchClasses();
      });

      window.editClass = (id) => {
        const c = classesList.find(x => x._id === id);
        if (!c) return;

        document.getElementById('editClassDbId').value = c._id;
        document.getElementById('clsNameInput').value = c.className;
        document.getElementById('clsDeptInput').value = c.department;
        document.getElementById('clsYearInput').value = c.year;
        
        window.bindYearSemesterCascading(document.getElementById('clsYearInput'), document.getElementById('clsSemInput'), false);
        document.getElementById('clsSemInput').value = c.semester;

        document.getElementById('clsSecInput').value = c.section || 'A';
        document.getElementById('clsAdvisorInput').value = c.classAdvisor || '';
        document.getElementById('clsRoomInput').value = c.roomNumber || '';

        document.getElementById('classModalTitle').innerHTML = '<i class="fa-solid fa-pen" style="color: var(--primary);"></i> Edit Class Record';
        modal.classList.add('active');
      };

      window.deleteClass = async (id) => {
        if (!confirm('Delete this class configuration?')) return;
        try {
          const baseUrl = window.APP_CONFIG.getApiBaseUrl();
          const token = localStorage.getItem('jp_dms_token');
          const res = await fetch(`${baseUrl}/classes/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const json = await res.json();
          if (res.ok && json.success !== false) {
            alert(json.message || 'Class deleted successfully.');
            fetchClasses();
          } else {
            alert(`Delete Failed: ${json?.message || json?.error || 'Deletion failed.'}`);
          }
        } catch (e) {
          alert(`Delete Error: ${e.message}`);
        }
      };

      document.getElementById('exportClassesBtn').addEventListener('click', () => {
        if (!classesList.length) return alert('No classes data to export.');
        exporter.exportToExcel('JP_College_Classes', classesList);
      });

      fetchClasses();
    });
  </script>
</body>
</html>
