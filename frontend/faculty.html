<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP College ERP - Faculty Directory</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="main-content-wrapper">
    <div class="page-header-title">
      <h2><i class="fa-solid fa-chalkboard-user"></i> Faculty Directory</h2>
      <div class="admin-only">
        <button class="btn-primary" id="openAddFacultyModalBtn">
          <i class="fa-solid fa-plus"></i> Add Faculty Member
        </button>
      </div>
    </div>

    <!-- Data Table Card -->
    <div class="card-glass">
      <div class="table-responsive">
        <table class="custom-table">
          <thead>
            <tr>
              <th>Faculty ID</th>
              <th>Faculty Name</th>
              <th>Department</th>
              <th>Subject Assigned</th>
              <th>Designation</th>
              <th>Email Address</th>
            </tr>
          </thead>
          <tbody id="facultyTableBody">
            <!-- Dynamic faculty records -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2026 J.P. College of Engineering. All rights reserved. Department Management ERP System.
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
