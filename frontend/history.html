<!DOCTYPE html>
<html lang="en" data-theme="dark-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit History - J.P. College of Engineering - AI&DS Department Management System</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="app-main-content">
    <div class="glass-card">
      <div class="card-header-flex">
        <h2><i class="fa-solid fa-clock-rotate-left"></i> System Modification Audit History</h2>
        <div style="display:flex; gap:10px;">
          <button class="btn-gold" onclick="app.downloadHistoryPDF()"><i class="fa-solid fa-file-pdf"></i> Download PDF</button>
          <button class="btn-gold" onclick="exporter.exportToExcel('Audit_History', app.data.history)"><i class="fa-solid fa-file-excel"></i> Download Excel</button>
        </div>
      </div>

      <div class="table-responsive">
        <table class="custom-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Time</th>
              <th>Action Performed</th>
              <th>User / Role</th>
              <th>Department</th>
              <th>Record Updated / Details</th>
            </tr>
          </thead>
          <tbody id="historyTbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/export.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
