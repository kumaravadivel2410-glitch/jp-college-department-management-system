<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP College ERP - Semester Marks</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="main-content-wrapper">
    <div class="page-header-title">
      <h2><i class="fa-solid fa-graduation-cap"></i> Semester Examinations Grade & Results</h2>
    </div>

    <!-- Data Table Card -->
    <div class="card-glass">
      <div class="table-responsive">
        <table class="custom-table">
          <thead>
            <tr>
              <th>Register No</th>
              <th>Student Name</th>
              <th>Subject</th>
              <th>Grade</th>
              <th>CGPA</th>
              <th>Result</th>
            </tr>
          </thead>
          <tbody id="semesterMarksTableBody">
            <!-- Dynamic semester marks -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2026 J.P. College of Engineering. All rights reserved. Department Management ERP System.
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
