<!DOCTYPE html>
<html lang="en" data-theme="dark-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students Directory - J.P. College of Engineering - AI&DS Department Management System</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="app-main-content">
    <div class="glass-card">
      <div class="card-header-flex">
        <h2><i class="fa-solid fa-user-graduate"></i> Student Directory Management</h2>
        <div style="display:flex; gap:10px;">
          <button class="btn-red" onclick="app.openAddStudentModal()"><i class="fa-solid fa-plus"></i> Add Student</button>
          <button class="btn-gold" onclick="app.downloadStudentsPDF()"><i class="fa-solid fa-file-pdf"></i> Export PDF</button>
          <button class="btn-gold" onclick="exporter.exportToExcel('Student_List', app.data.students)"><i class="fa-solid fa-file-excel"></i> Export Excel</button>
        </div>
      </div>

      <div class="filter-toolbar">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="studentSearchInput" class="search-input" placeholder="Search by Register No, Name, Roll No...">
        </div>
        <select id="studentDeptFilter" class="filter-select">
          <option value="">All Departments</option>
        </select>
        <select id="studentYearFilter" class="filter-select">
          <option value="">All Years</option>
          <option value="I Year">I Year</option>
          <option value="II Year">II Year</option>
          <option value="III Year">III Year</option>
          <option value="IV Year">IV Year</option>
        </select>
      </div>

      <div class="table-responsive">
        <table class="custom-table">
          <thead>
            <tr>
              <th>Photo</th>
              <th>Register No</th>
              <th>Student Name</th>
              <th>Roll No</th>
              <th>Department</th>
              <th>Year / Sem</th>
              <th>Phone</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="studentsTbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Universal Modal for Add/Edit Student -->
  <div class="modal-overlay" id="universalModalOverlay">
    <div class="modal-content-box">
      <div class="modal-header">
        <h3 id="modalTitleText"><i class="fa-solid fa-user-plus"></i> Add Student</h3>
        <button class="modal-close-btn" onclick="app.closeModal()">&times;</button>
      </div>
      <form id="universalModalForm">
        <div class="form-grid" id="modalFormGrid"></div>
        <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px;">
          <button type="button" class="btn-outline-gold" onclick="app.closeModal()">Cancel</button>
          <button type="submit" class="btn-red" id="modalSubmitBtn">Save Record</button>
        </div>
      </form>
    </div>
  </div>

  <!-- View Student Profile Modal -->
  <div class="modal-overlay" id="studentProfileModal">
    <div class="modal-content-box" style="max-width:650px;">
      <div class="modal-header">
        <h3><i class="fa-solid fa-id-card"></i> Student Profile Card</h3>
        <button class="modal-close-btn" onclick="app.closeProfileModal()">&times;</button>
      </div>
      <div id="studentProfileContent"></div>
      <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px;">
        <button class="btn-gold" onclick="app.printSingleStudentProfile()"><i class="fa-solid fa-print"></i> Print Details</button>
        <button class="btn-outline-gold" onclick="app.closeProfileModal()">Close</button>
      </div>
    </div>
  </div>

  <button class="fab-add-btn" onclick="app.openAddStudentModal()" title="Add Student">
    <i class="fa-solid fa-plus"></i>
  </button>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/export.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
