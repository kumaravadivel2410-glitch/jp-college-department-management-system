<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP College ERP - Student Directory & Semester Promotion</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="main-content-wrapper">
    <div class="page-header-title">
      <h2><i class="fa-solid fa-user-graduate" style="color: var(--primary);"></i> Student Directory & Semester Promotion</h2>
      <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
        <button id="openPromoteModalBtn" class="btn-primary" style="background:#16A34A; display:none;"><i class="fa-solid fa-angles-up"></i> Promote Students</button>
        <a href="import-export.html" class="btn-secondary"><i class="fa-solid fa-file-import"></i> Bulk Import</a>
        <button id="exportStudentsBtn" class="btn-secondary"><i class="fa-solid fa-file-excel"></i> Export Students</button>
        <button id="openAddStudentModalBtn" class="btn-primary" style="display:none;"><i class="fa-solid fa-plus-circle"></i> Add Student</button>
      </div>
    </div>

    <!-- Filters Section (Semester 1 - 8) -->
    <div class="card-glass" style="margin-bottom: 1.5rem;">
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 1rem;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Department</label>
          <select id="stuFilterDept" class="form-control">
            <option value="All">All Departments</option>
            <option value="AI & DS" selected>AI & DS</option>
            <option value="CSE">CSE</option>
            <option value="ECE">ECE</option>
            <option value="EEE">EEE</option>
            <option value="MECH">Mechanical</option>
            <option value="CIVIL">Civil</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Year</label>
          <select id="stuFilterYear" class="form-control">
            <option value="All">All Years</option>
            <option value="I Year">I Year</option>
            <option value="II Year">II Year</option>
            <option value="III Year" selected>III Year</option>
            <option value="IV Year">IV Year</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Semester (1–8)</label>
          <select id="stuFilterSem" class="form-control">
            <option value="All">All Semesters</option>
            <option value="Semester 1">Semester 1</option>
            <option value="Semester 2">Semester 2</option>
            <option value="Semester 3">Semester 3</option>
            <option value="Semester 4">Semester 4</option>
            <option value="Semester 5" selected>Semester 5</option>
            <option value="Semester 6">Semester 6</option>
            <option value="Semester 7">Semester 7</option>
            <option value="Semester 8">Semester 8</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Section</label>
          <select id="stuFilterSec" class="form-control">
            <option value="All">All Sections</option>
            <option value="A" selected>Section A</option>
            <option value="B">Section B</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Students Table -->
    <div class="table-responsive">
      <table class="custom-table">
        <thead>
          <tr>
            <th>Register No</th>
            <th>Student Name</th>
            <th>Department</th>
            <th>Year & Sem</th>
            <th>Section</th>
            <th>Phone</th>
            <th>Status</th>
            <th style="width: 140px;">Actions</th>
          </tr>
        </thead>
        <tbody id="studentsTbody">
          <!-- Dynamic Students Row -->
        </tbody>
      </table>
    </div>
  </main>

  <!-- Promote Students Modal -->
  <div class="modal-overlay" id="promoteModal">
    <div class="modal-box" style="max-width: 550px;">
      <div class="modal-header">
        <h3><i class="fa-solid fa-angles-up" style="color: var(--primary);"></i> Batch Promote Students Semester</h3>
        <button class="close-modal-btn" id="closePromoteModalBtn">&times;</button>
      </div>
      <form id="promoteForm">
        <div class="form-group">
          <label class="form-label">Select Target Department</label>
          <select id="promoteDept" class="form-control">
            <option value="All">All Departments</option>
            <option value="AI & DS" selected>AI & DS</option>
            <option value="CSE">CSE</option>
            <option value="ECE">ECE</option>
            <option value="EEE">EEE</option>
          </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Current Semester *</label>
            <select id="promoteFromSem" class="form-control">
              <option value="Semester 1">Semester 1</option>
              <option value="Semester 2">Semester 2</option>
              <option value="Semester 3">Semester 3</option>
              <option value="Semester 4">Semester 4</option>
              <option value="Semester 5" selected>Semester 5</option>
              <option value="Semester 6">Semester 6</option>
              <option value="Semester 7">Semester 7</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Promote To Semester *</label>
            <select id="promoteToSem" class="form-control">
              <option value="Semester 2">Semester 2</option>
              <option value="Semester 3">Semester 3</option>
              <option value="Semester 4">Semester 4</option>
              <option value="Semester 5">Semester 5</option>
              <option value="Semester 6" selected>Semester 6</option>
              <option value="Semester 7">Semester 7</option>
              <option value="Semester 8">Semester 8</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn-success" style="width: 100%; justify-content: center; margin-top: 0.5rem; padding: 0.85rem;">
          <i class="fa-solid fa-angles-up"></i> Execute Batch Promotion
        </button>
      </form>
    </div>
  </div>

  <!-- Add/Edit Student Modal -->
  <div class="modal-overlay" id="studentFormModal">
    <div class="modal-box" style="max-width: 750px;">
      <div class="modal-header">
        <h3 id="modalStudentTitle"><i class="fa-solid fa-user-plus" style="color: var(--primary);"></i> Add Student Record</h3>
        <button class="close-modal-btn" id="closeStudentFormModalBtn">&times;</button>
      </div>
      <form id="studentForm">
        <input type="hidden" id="editStudentDbId">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Register Number *</label>
            <input type="text" id="mRegisterNo" class="form-control" placeholder="953621104001" required>
          </div>
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input type="text" id="mStudentName" class="form-control" placeholder="Aarav Kumar" required>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Email Address *</label>
            <input type="email" id="mEmail" class="form-control" placeholder="aarav@jpcoe.ac.in" required>
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" id="mPhone" class="form-control" placeholder="9123456780">
          </div>
          <div class="form-group">
            <label class="form-label">Gender</label>
            <select id="mGender" class="form-control">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Department *</label>
            <select id="mDept" class="form-control">
              <option value="AI & DS">AI & DS</option>
              <option value="CSE">CSE</option>
              <option value="ECE">ECE</option>
              <option value="EEE">EEE</option>
              <option value="MECH">Mechanical</option>
              <option value="CIVIL">Civil</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Year</label>
            <select id="mYear" class="form-control">
              <option value="I Year">I Year</option>
              <option value="II Year">II Year</option>
              <option value="III Year" selected>III Year</option>
              <option value="IV Year">IV Year</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Semester (1–8)</label>
            <select id="mSem" class="form-control">
              <option value="Semester 1">Semester 1</option>
              <option value="Semester 2">Semester 2</option>
              <option value="Semester 3">Semester 3</option>
              <option value="Semester 4">Semester 4</option>
              <option value="Semester 5" selected>Semester 5</option>
              <option value="Semester 6">Semester 6</option>
              <option value="Semester 7">Semester 7</option>
              <option value="Semester 8">Semester 8</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Section</label>
            <select id="mSec" class="form-control">
              <option value="A">Section A</option>
              <option value="B">Section B</option>
            </select>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Batch</label>
            <input type="text" id="mBatch" class="form-control" placeholder="2021 - 2025">
          </div>
          <div class="form-group">
            <label class="form-label">Parent Name</label>
            <input type="text" id="mParentName" class="form-control" placeholder="R. Kumar">
          </div>
          <div class="form-group">
            <label class="form-label">Parent Phone</label>
            <input type="tel" id="mParentPhone" class="form-control" placeholder="9443322110">
          </div>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem;">
          <i class="fa-solid fa-save"></i> Save Student Record
        </button>
      </form>
    </div>
  </div>

  <footer>
    &copy; 2026 J.P. College of Engineering. All rights reserved. Department Management ERP System.
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/export.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('jp_dms_user')) || {};
      const isFacultyOrAdmin = user.role === 'faculty' || user.role === 'admin' || user.role === 'super_admin';
      const isAdmin = user.role === 'admin' || user.role === 'super_admin';

      if (isFacultyOrAdmin) document.getElementById('openAddStudentModalBtn').style.display = 'inline-flex';
      if (isAdmin) document.getElementById('openPromoteModalBtn').style.display = 'inline-flex';

      let studentsList = [];
      const modal = document.getElementById('studentFormModal');
      const promoteModal = document.getElementById('promoteModal');

      document.getElementById('openAddStudentModalBtn')?.addEventListener('click', () => {
        document.getElementById('editStudentDbId').value = '';
        document.getElementById('modalStudentTitle').innerHTML = '<i class="fa-solid fa-user-plus" style="color: var(--primary);"></i> Add Student Record';
        document.getElementById('studentForm').reset();
        modal.classList.add('active');
      });

      document.getElementById('openPromoteModalBtn')?.addEventListener('click', () => promoteModal.classList.add('active'));
      document.getElementById('closePromoteModalBtn')?.addEventListener('click', () => promoteModal.classList.remove('active'));
      document.getElementById('closeStudentFormModalBtn')?.addEventListener('click', () => modal.classList.remove('active'));

      const fetchStudents = async () => {
        const tbody = document.getElementById('studentsTbody');
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:2rem; color:var(--text-muted);"><i class="fa-solid fa-spinner fa-spin"></i> Loading students...</td></tr>';

        const dept = document.getElementById('stuFilterDept').value;
        const year = document.getElementById('stuFilterYear').value;
        const sem = document.getElementById('stuFilterSem').value;
        const sec = document.getElementById('stuFilterSec').value;

        try {
          const baseUrl = window.APP_CONFIG.getApiBaseUrl();
          const query = `?department=${encodeURIComponent(dept)}&year=${encodeURIComponent(year)}&semester=${encodeURIComponent(sem)}&section=${encodeURIComponent(sec)}`;
          const res = await fetch(`${baseUrl}/students${query}`);
          const json = await res.json();
          studentsList = json.data || [];

          if (studentsList.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:2rem; color:var(--text-secondary);">No student records found.</td></tr>';
            return;
          }

          tbody.innerHTML = studentsList.map(s => `
            <tr>
              <td style="font-weight:700; color:var(--primary);">${s.registerNo}</td>
              <td style="font-weight:700; color:#1E3A8A;">${s.studentName}</td>
              <td>${s.department}</td>
              <td>${s.year} (${s.semester})</td>
              <td><span class="badge badge-primary">Sec ${s.section || 'A'}</span></td>
              <td>${s.phone || '-'}</td>
              <td><span class="badge ${s.status === 'Active' ? 'badge-success' : 'badge-warning'}">${s.status || 'Active'}</span></td>
              <td>
                <div style="display:flex; gap:0.35rem;">
                  ${isFacultyOrAdmin ? `<button onclick="editStudent('${s._id}')" class="btn-secondary" style="padding:0.35rem 0.6rem; font-size:0.75rem;" title="Edit"><i class="fa-solid fa-pen"></i></button>` : ''}
                  ${isFacultyOrAdmin ? `<button onclick="deleteStudent('${s._id}')" class="btn-danger" style="padding:0.35rem 0.6rem; font-size:0.75rem;" title="Delete"><i class="fa-solid fa-trash"></i></button>` : ''}
                </div>
              </td>
            </tr>
          `).join('');

        } catch (err) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:var(--error);">Failed to load students.</td></tr>';
        }
      };

      document.querySelectorAll('#stuFilterDept, #stuFilterYear, #stuFilterSem, #stuFilterSec').forEach(el => el.addEventListener('change', fetchStudents));

      document.getElementById('promoteForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
          department: document.getElementById('promoteDept').value,
          currentSemester: document.getElementById('promoteFromSem').value,
          targetSemester: document.getElementById('promoteToSem').value
        };

        const baseUrl = window.APP_CONFIG.getApiBaseUrl();
        const token = localStorage.getItem('jp_dms_token');
        const res = await fetch(`${baseUrl}/students/promote`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(payload)
        });

        const json = await res.json();
        alert(json.message || 'Students promoted!');
        promoteModal.classList.remove('active');
        fetchStudents();
      });

      document.getElementById('studentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('editStudentDbId').value;
        const payload = {
          registerNo: document.getElementById('mRegisterNo').value,
          studentName: document.getElementById('mStudentName').value,
          email: document.getElementById('mEmail').value,
          phone: document.getElementById('mPhone').value,
          gender: document.getElementById('mGender').value,
          department: document.getElementById('mDept').value,
          year: document.getElementById('mYear').value,
          semester: document.getElementById('mSem').value,
          section: document.getElementById('mSec').value,
          batch: document.getElementById('mBatch').value,
          parentName: document.getElementById('mParentName').value,
          parentPhone: document.getElementById('mParentPhone').value
        };

        const baseUrl = window.APP_CONFIG.getApiBaseUrl();
        const token = localStorage.getItem('jp_dms_token');
        const url = id ? `${baseUrl}/students/${id}` : `${baseUrl}/students`;
        const method = id ? 'PUT' : 'POST';

        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (res.ok && data.success !== false) {
          alert(data.message || 'Student record saved successfully!');
          modal.classList.remove('active');
          fetchStudents();
        } else {
          alert(`Save Failed: ${data.message || 'Validation error'}`);
        }
      });

      window.editStudent = (id) => {
        const s = studentsList.find(x => x._id === id);
        if (!s) return;

        document.getElementById('editStudentDbId').value = s._id;
        document.getElementById('mRegisterNo').value = s.registerNo;
        document.getElementById('mStudentName').value = s.studentName;
        document.getElementById('mEmail').value = s.email;
        document.getElementById('mPhone').value = s.phone || '';
        document.getElementById('mGender').value = s.gender || 'Male';
        document.getElementById('mDept').value = s.department;
        document.getElementById('mYear').value = s.year;
        document.getElementById('mSem').value = s.semester;
        document.getElementById('mSec').value = s.section || 'A';
        document.getElementById('mBatch').value = s.batch || '';
        document.getElementById('mParentName').value = s.parentName || '';
        document.getElementById('mParentPhone').value = s.parentPhone || '';

        document.getElementById('modalStudentTitle').innerHTML = '<i class="fa-solid fa-user-pen" style="color: var(--primary);"></i> Edit Student Record';
        modal.classList.add('active');
      };

      window.deleteStudent = async (id) => {
        if (!confirm('Are you sure you want to delete this student record?')) return;
        try {
          const baseUrl = window.APP_CONFIG.getApiBaseUrl();
          const token = localStorage.getItem('jp_dms_token');
          const res = await fetch(`${baseUrl}/students/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const json = await res.json();
          if (res.ok && json.success !== false) {
            alert(json.message || 'Student deleted successfully.');
            fetchStudents();
          } else {
            alert(`Delete Failed: ${json?.message || json?.error || 'Unknown error'}`);
          }
        } catch (e) {
          alert(`Delete error: ${e.message}`);
        }
      };

      document.getElementById('exportStudentsBtn').addEventListener('click', () => {
        if (!studentsList.length) return alert('No students data to export.');
        exporter.exportToExcel('JP_College_Students', studentsList);
      });

      fetchStudents();
    });
  </script>
</body>
</html>
