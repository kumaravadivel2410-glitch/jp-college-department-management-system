<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP College ERP - Subject Notes Repository</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="main-content-wrapper">
    <div class="page-header-title">
      <h2><i class="fa-solid fa-file-pdf" style="color: var(--primary);"></i> Subject Notes Repository</h2>
      <button id="openUploadNoteModalBtn" class="btn-primary" style="display:none;">
        <i class="fa-solid fa-cloud-arrow-up"></i> Upload Subject Notes
      </button>
    </div>

    <!-- Filter Bar with Dynamic Year -> Semester Cascading -->
    <div class="card-glass" style="margin-bottom: 1.5rem;">
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 1rem;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Department</label>
          <select id="noteDeptFilter" class="form-control">
            <option value="All">All Departments</option>
            <option value="AI & DS" selected>AI & DS</option>
            <option value="CSE">CSE</option>
            <option value="ECE">ECE</option>
            <option value="EEE">EEE</option>
            <option value="MECH">Mechanical</option>
            <option value="CIVIL">Civil</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Academic Year</label>
          <select id="noteYearFilter" class="form-control">
            <option value="I Year">I Year</option>
            <option value="II Year">II Year</option>
            <option value="III Year" selected>III Year</option>
            <option value="IV Year">IV Year</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Semester (Cascading)</label>
          <select id="noteSemFilter" class="form-control">
            <!-- Dynamic Cascading Options -->
          </select>
        </div>
      </div>
    </div>

    <!-- Notes Grid -->
    <div id="notesGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem;">
      <!-- Dynamic Notes Cards -->
    </div>
  </main>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="uploadNoteModal">
    <div class="modal-box" style="max-width: 600px;">
      <div class="modal-header">
        <h3><i class="fa-solid fa-cloud-arrow-up" style="color: var(--primary);"></i> Upload Subject Notes</h3>
        <button class="close-modal-btn" id="closeUploadNoteModalBtn">&times;</button>
      </div>
      <form id="uploadNoteForm">
        <div class="form-group">
          <label class="form-label">Notes Title *</label>
          <input type="text" id="noteTitle" class="form-control" placeholder="e.g. Deep Learning Module 1 - Neural Networks Overview" required>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Department *</label>
            <select id="noteDept" class="form-control">
              <option value="AI & DS">AI & DS</option>
              <option value="CSE">CSE</option>
              <option value="ECE">ECE</option>
              <option value="EEE">EEE</option>
              <option value="MECH">Mechanical</option>
              <option value="CIVIL">Civil</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Year *</label>
            <select id="noteYear" class="form-control">
              <option value="I Year">I Year</option>
              <option value="II Year">II Year</option>
              <option value="III Year" selected>III Year</option>
              <option value="IV Year">IV Year</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Semester *</label>
            <select id="noteSem" class="form-control">
              <!-- Dynamic Cascading Options -->
            </select>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Subject Code</label>
            <input type="text" id="noteSubjectCode" class="form-control" placeholder="e.g. AD3501">
          </div>
          <div class="form-group">
            <label class="form-label">Subject Name *</label>
            <input type="text" id="noteSubjectName" class="form-control" placeholder="e.g. Deep Learning" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Resource File URL (PDF, PPT, ZIP, DOCX, Video Link) *</label>
          <input type="url" id="noteFileUrl" class="form-control" placeholder="https://example.com/notes.pdf" required>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">
          <i class="fa-solid fa-paper-plane"></i> Upload & Share Notes
        </button>
      </form>
    </div>
  </div>

  <footer>
    &copy; 2026 J.P. College of Engineering. All rights reserved. Department Management ERP System.
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/semester-cascader.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Bind Dynamic Year -> Semester Cascading
      window.bindYearSemesterCascading(document.getElementById('noteYearFilter'), document.getElementById('noteSemFilter'), true);
      window.bindYearSemesterCascading(document.getElementById('noteYear'), document.getElementById('noteSem'), false);

      const user = JSON.parse(localStorage.getItem('jp_dms_user')) || {};
      const isFacultyOrAdmin = user.role === 'faculty' || user.role === 'admin' || user.role === 'super_admin';

      if (isFacultyOrAdmin) {
        document.getElementById('openUploadNoteModalBtn').style.display = 'inline-flex';
      }

      const modal = document.getElementById('uploadNoteModal');
      document.getElementById('openUploadNoteModalBtn')?.addEventListener('click', () => {
        document.getElementById('uploadNoteForm').reset();
        window.bindYearSemesterCascading(document.getElementById('noteYear'), document.getElementById('noteSem'), false);
        modal.classList.add('active');
      });
      document.getElementById('closeUploadNoteModalBtn')?.addEventListener('click', () => modal.classList.remove('active'));

      const fetchNotes = async () => {
        const grid = document.getElementById('notesGrid');
        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--text-muted);"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><p style="margin-top:0.5rem;">Loading subject notes...</p></div>';

        const dept = document.getElementById('noteDeptFilter').value;
        const year = document.getElementById('noteYearFilter').value;
        const sem = document.getElementById('noteSemFilter').value;

        try {
          const baseUrl = window.APP_CONFIG.getApiBaseUrl();
          const query = `?department=${encodeURIComponent(dept)}&year=${encodeURIComponent(year)}&semester=${encodeURIComponent(sem)}`;
          const res = await fetch(`${baseUrl}/notes${query}`);
          const json = await res.json();
          const list = json.data || [];

          if (list.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:3rem; background:#FFF; border-radius:12px; border:1px solid var(--border-subtle);"><i class="fa-solid fa-file-pdf fa-3x" style="color:var(--primary);"></i><h3 style="margin-top:1rem; color:#1E3A8A;">No Subject Notes Uploaded</h3></div>';
            return;
          }

          grid.innerHTML = list.map(item => `
            <div class="card-glass" style="display:flex; flex-direction:column; justify-content:space-between; border-top: 3px solid var(--primary);">
              <div>
                <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
                  <span class="badge badge-primary">${item.subjectCode || 'DOC'}</span>
                  <span class="badge badge-gold">${item.fileType?.toUpperCase() || 'PDF'}</span>
                </div>
                <h3 style="font-size:1.05rem; font-weight:700; color:#1E3A8A; margin-bottom:0.4rem;">${item.title}</h3>
                <div style="font-size:0.8rem; color:var(--text-secondary); margin-bottom:1rem;">
                  <div>Subject: <strong>${item.subjectName}</strong></div>
                  <div>Year & Sem: <strong>${item.year || 'III Year'} (${item.semester})</strong></div>
                  <div>Faculty: <strong>${item.uploadedBy || 'Faculty Member'}</strong></div>
                </div>
              </div>
              <div style="display:flex; gap:0.5rem; border-top:1px solid var(--border-subtle); padding-top:0.75rem;">
                <a href="${item.fileUrl}" target="_blank" class="btn-primary" style="flex:1; justify-content:center; padding:0.45rem;"><i class="fa-solid fa-download"></i> Download</a>
                ${isFacultyOrAdmin ? `<button onclick="deleteNote('${item._id}')" class="btn-danger" title="Delete Note"><i class="fa-solid fa-trash"></i></button>` : ''}
              </div>
            </div>
          `).join('');

        } catch (err) {
          grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--error);">Failed to load subject notes.</div>';
        }
      };

      document.querySelectorAll('#noteDeptFilter, #noteYearFilter, #noteSemFilter').forEach(el => el.addEventListener('change', fetchNotes));

      document.getElementById('uploadNoteForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
          title: document.getElementById('noteTitle').value,
          department: document.getElementById('noteDept').value,
          year: document.getElementById('noteYear').value,
          semester: document.getElementById('noteSem').value,
          subjectCode: document.getElementById('noteSubjectCode').value,
          subjectName: document.getElementById('noteSubjectName').value,
          fileUrl: document.getElementById('noteFileUrl').value
        };

        const baseUrl = window.APP_CONFIG.getApiBaseUrl();
        const token = localStorage.getItem('jp_dms_token');
        const res = await fetch(`${baseUrl}/notes/upload`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        alert(data.message || 'Notes uploaded successfully!');
        modal.classList.remove('active');
        fetchNotes();
      });

      window.deleteNote = async (id) => {
        if (!confirm('Delete this subject note?')) return;
        const baseUrl = window.APP_CONFIG.getApiBaseUrl();
        const token = localStorage.getItem('jp_dms_token');
        await fetch(`${baseUrl}/notes/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        fetchNotes();
      };

      fetchNotes();
    });
  </script>
</body>
</html>
