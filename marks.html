<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP College ERP - Central Marks & Grade Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="main-content-wrapper">
    <div class="page-header-title">
      <h2><i class="fa-solid fa-square-poll-vertical" style="color: var(--primary);"></i> Central Marks & Grade Management</h2>
      <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
        <a href="import-export.html" class="btn-secondary"><i class="fa-solid fa-file-import"></i> Bulk Import Marks</a>
        <button id="exportCurrentMarksBtn" class="btn-secondary"><i class="fa-solid fa-file-excel"></i> Export Grade Sheet</button>
      </div>
    </div>

    <!-- Mode Selector Tabs -->
    <div style="display: flex; gap: 0.75rem; margin-bottom: 1.5rem;">
      <button id="tabInternalBtn" class="btn-primary" style="flex:1; justify-content:center; padding:0.75rem;"><i class="fa-solid fa-file-signature"></i> Internal Assessment Marks</button>
      <button id="tabSemesterBtn" class="btn-secondary" style="flex:1; justify-content:center; padding:0.75rem;"><i class="fa-solid fa-graduation-cap"></i> Semester Examinations Grade Sheet</button>
    </div>

    <!-- Filter Bar -->
    <div class="card-glass" style="margin-bottom: 1.5rem;">
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 1rem;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Department</label>
          <select id="marksDept" class="form-control">
            <option value="AI & DS" selected>AI & DS</option>
            <option value="CSE">CSE</option>
            <option value="ECE">ECE</option>
            <option value="EEE">EEE</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Year</label>
          <select id="marksYear" class="form-control">
            <option value="III Year" selected>III Year</option>
            <option value="I Year">I Year</option>
            <option value="II Year">II Year</option>
            <option value="IV Year">IV Year</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Semester</label>
          <select id="marksSem" class="form-control">
            <option value="Semester 1">Semester 1</option>
            <option value="Semester 2">Semester 2</option>
            <option value="Semester 3">Semester 3</option>
            <option value="Semester 4">Semester 4</option>
            <option value="Semester 5" selected>Semester 5</option>
            <option value="Semester 6">Semester 6</option>
            <option value="Semester 7">Semester 7</option>
            <option value="Semester 8">Semester 8</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Section</label>
          <select id="marksSec" class="form-control">
            <option value="A" selected>Section A</option>
            <option value="B">Section B</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Dynamic Marks Content Table -->
    <div class="table-responsive">
      <table class="custom-table">
        <thead id="marksThead"></thead>
        <tbody id="marksTbody"></tbody>
      </table>
    </div>
  </main>

  <footer>
    &copy; 2026 J.P. College of Engineering. All rights reserved. Department Management ERP System.
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/export.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let activeTab = 'internal'; // 'internal' or 'semester'
      let marksData = [];

      const tabInternal = document.getElementById('tabInternalBtn');
      const tabSemester = document.getElementById('tabSemesterBtn');

      tabInternal.addEventListener('click', () => {
        activeTab = 'internal';
        tabInternal.className = 'btn-primary';
        tabSemester.className = 'btn-secondary';
        fetchMarks();
      });

      tabSemester.addEventListener('click', () => {
        activeTab = 'semester';
        tabSemester.className = 'btn-primary';
        tabInternal.className = 'btn-secondary';
        fetchMarks();
      });

      const fetchMarks = async () => {
        const thead = document.getElementById('marksThead');
        const tbody = document.getElementById('marksTbody');

        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding:2rem; color:var(--text-muted);"><i class="fa-solid fa-spinner fa-spin"></i> Loading marks...</td></tr>';

        const dept = document.getElementById('marksDept').value;
        const year = document.getElementById('marksYear').value;
        const sem = document.getElementById('marksSem').value;
        const sec = document.getElementById('marksSec').value;

        const baseUrl = window.APP_CONFIG.getApiBaseUrl();
        const endpoint = activeTab === 'internal' ? 'internal-marks' : 'semester-marks';
        const query = `?department=${encodeURIComponent(dept)}&year=${encodeURIComponent(year)}&semester=${encodeURIComponent(sem)}&section=${encodeURIComponent(sec)}`;

        try {
          const res = await fetch(`${baseUrl}/${endpoint}${query}`);
          const json = await res.json();
          marksData = json.data || [];

          if (activeTab === 'internal') {
            thead.innerHTML = `
              <tr>
                <th>Register No</th>
                <th>Student Name</th>
                <th>Subject</th>
                <th>Int 1 (50)</th>
                <th>Int 2 (50)</th>
                <th>Int 3 (50)</th>
                <th>Average</th>
                <th>Model (100)</th>
                <th>Assign (10)</th>
                <th>Total Internal</th>
              </tr>
            `;

            if (marksData.length === 0) {
              tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding:2rem; color:var(--text-secondary);">No internal mark records found.</td></tr>';
              return;
            }

            tbody.innerHTML = marksData.map(m => `
              <tr>
                <td style="font-weight:700; color:var(--primary);">${m.studentRegisterNo}</td>
                <td style="font-weight:700; color:#1E3A8A;">${m.studentName || '-'}</td>
                <td>${m.subjectCode || 'AD3501'}</td>
                <td>${m.internal1}</td>
                <td>${m.internal2}</td>
                <td>${m.internal3 || '-'}</td>
                <td style="font-weight:700; color:var(--primary);">${m.average || 47.6}</td>
                <td>${m.modelExam || 90}</td>
                <td>${m.assignmentMark || 10}</td>
                <td style="font-weight:800; color:#16A34A;">${m.totalInternal || 48}</td>
              </tr>
            `).join('');

          } else {
            thead.innerHTML = `
              <tr>
                <th>Register No</th>
                <th>Student Name</th>
                <th>Subject Code</th>
                <th>Subject Name</th>
                <th>Grade</th>
                <th>Marks (100)</th>
                <th>Credits</th>
                <th>GPA</th>
                <th>CGPA</th>
                <th>Result</th>
              </tr>
            `;

            if (marksData.length === 0) {
              tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding:2rem; color:var(--text-secondary);">No semester examination grade records found.</td></tr>';
              return;
            }

            tbody.innerHTML = marksData.map(m => `
              <tr>
                <td style="font-weight:700; color:var(--primary);">${m.studentRegisterNo}</td>
                <td style="font-weight:700; color:#1E3A8A;">${m.studentName || '-'}</td>
                <td>${m.subjectCode}</td>
                <td>${m.subjectName || '-'}</td>
                <td><span class="badge badge-primary">${m.grade || 'O'}</span></td>
                <td style="font-weight:700;">${m.marks || 95}</td>
                <td>${m.credits || 4}</td>
                <td>${m.gpa || 9.5}</td>
                <td>${m.cgpa || 9.2}</td>
                <td><span class="badge ${m.result === 'PASS' ? 'badge-success' : 'badge-warning'}">${m.result || 'PASS'}</span></td>
              </tr>
            `).join('');
          }

        } catch (err) {
          tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; color:var(--error);">Failed to load marks dataset.</td></tr>';
        }
      };

      document.querySelectorAll('#marksDept, #marksYear, #marksSem, #marksSec').forEach(el => el.addEventListener('change', fetchMarks));

      document.getElementById('exportCurrentMarksBtn').addEventListener('click', () => {
        if (!marksData.length) return alert('No data to export.');
        exporter.exportToExcel(`JP_College_${activeTab.toUpperCase()}_MARKS`, marksData);
      });

      fetchMarks();
    });
  </script>
</body>
</html>
