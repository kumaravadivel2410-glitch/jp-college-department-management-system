<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP College ERP - Semester Grade & Result Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="main-content-wrapper">
    <div class="page-header-title">
      <h2><i class="fa-solid fa-graduation-cap" style="color: var(--primary);"></i> Semester Grade Sheet & Result Management</h2>
      <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
        <a href="import-export.html" class="btn-secondary"><i class="fa-solid fa-file-import"></i> Bulk Import Grades</a>
        <button id="exportSemMarksBtn" class="btn-secondary"><i class="fa-solid fa-file-excel"></i> Export Grade Sheet</button>
        <button id="openAddSemModalBtn" class="btn-primary" style="display:none;"><i class="fa-solid fa-plus-circle"></i> Enter Semester Grade</button>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="card-glass" style="margin-bottom: 1.5rem;">
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 1rem;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Department</label>
          <select id="semFilterDept" class="form-control">
            <option value="All">All Departments</option>
            <option value="AI & DS" selected>AI & DS</option>
            <option value="CSE">CSE</option>
            <option value="ECE">ECE</option>
            <option value="EEE">EEE</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Year</label>
          <select id="semFilterYear" class="form-control">
            <option value="All">All Years</option>
            <option value="III Year" selected>III Year</option>
            <option value="I Year">I Year</option>
            <option value="II Year">II Year</option>
            <option value="IV Year">IV Year</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Semester</label>
          <select id="semFilterSem" class="form-control">
            <option value="All">All Semesters</option>
            <option value="Semester I">Semester I</option>
            <option value="Semester II">Semester II</option>
            <option value="Semester III">Semester III</option>
            <option value="Semester IV">Semester IV</option>
            <option value="Semester V" selected>Semester V</option>
            <option value="Semester VI">Semester VI</option>
            <option value="Semester VII">Semester VII</option>
            <option value="Semester VIII">Semester VIII</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Section</label>
          <select id="semFilterSec" class="form-control">
            <option value="All">All Sections</option>
            <option value="A" selected>Section A</option>
            <option value="B">Section B</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Marks Table -->
    <div class="table-responsive">
      <table class="custom-table">
        <thead>
          <tr>
            <th>Register No</th>
            <th>Student Name</th>
            <th>Subject Code</th>
            <th>Subject Name</th>
            <th>Semester</th>
            <th>Grade</th>
            <th>Marks (100)</th>
            <th>Credits</th>
            <th>GPA</th>
            <th>CGPA</th>
            <th>Result</th>
            <th style="width: 120px;">Actions</th>
          </tr>
        </thead>
        <tbody id="semesterMarksTableBody">
          <!-- Dynamic Records -->
        </tbody>
      </table>
    </div>
  </main>

  <!-- Add/Edit Semester Mark Modal -->
  <div class="modal-overlay" id="semesterMarkModal">
    <div class="modal-box" style="max-width: 650px;">
      <div class="modal-header">
        <h3 id="semModalTitle"><i class="fa-solid fa-graduation-cap" style="color: var(--primary);"></i> Enter Semester Grade Record</h3>
        <button class="close-modal-btn" id="closeSemModalBtn">&times;</button>
      </div>
      <form id="semesterMarkForm">
        <input type="hidden" id="editSemDbId">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Student Register No *</label>
            <input type="text" id="semRegNo" class="form-control" placeholder="953621104001" required>
          </div>
          <div class="form-group">
            <label class="form-label">Student Name *</label>
            <input type="text" id="semName" class="form-control" placeholder="Aarav Kumar" required>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Subject Code *</label>
            <input type="text" id="semCode" class="form-control" placeholder="AD3501" required>
          </div>
          <div class="form-group">
            <label class="form-label">Subject Name *</label>
            <input type="text" id="semSubjectName" class="form-control" placeholder="Deep Learning" required>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Marks (Max 100) *</label>
            <input type="number" id="semMarks" class="form-control" min="0" max="100" value="95" required>
          </div>
          <div class="form-group">
            <label class="form-label">Credits</label>
            <input type="number" id="semCredits" class="form-control" value="4">
          </div>
          <div class="form-group">
            <label class="form-label">CGPA</label>
            <input type="number" step="0.01" id="semCgpa" class="form-control" value="9.2">
          </div>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem;">
          <i class="fa-solid fa-save"></i> Save Semester Grade Record
        </button>
      </form>
    </div>
  </div>

  <footer>
    &copy; 2026 J.P. College of Engineering. All rights reserved. Department Management ERP System.
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/export.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('jp_dms_user')) || {};
      const isFacultyOrAdmin = user.role === 'faculty' || user.role === 'admin' || user.role === 'super_admin';

      if (isFacultyOrAdmin) {
        document.getElementById('openAddSemModalBtn').style.display = 'inline-flex';
      }

      let semesterMarksList = [];
      const modal = document.getElementById('semesterMarkModal');

      document.getElementById('openAddSemModalBtn')?.addEventListener('click', () => {
        document.getElementById('editSemDbId').value = '';
        document.getElementById('semModalTitle').innerHTML = '<i class="fa-solid fa-graduation-cap" style="color: var(--primary);"></i> Enter Semester Grade Record';
        document.getElementById('semesterMarkForm').reset();
        modal.classList.add('active');
      });

      document.getElementById('closeSemModalBtn')?.addEventListener('click', () => modal.classList.remove('active'));

      const fetchSemesterMarks = async () => {
        const tbody = document.getElementById('semesterMarksTableBody');
        tbody.innerHTML = '<tr><td colspan="12" style="text-align:center; padding:2rem; color:var(--text-muted);"><i class="fa-solid fa-spinner fa-spin"></i> Loading semester grade sheet...</td></tr>';

        const dept = document.getElementById('semFilterDept').value;
        const year = document.getElementById('semFilterYear').value;
        const sem = document.getElementById('semFilterSem').value;
        const sec = document.getElementById('semFilterSec').value;

        try {
          const baseUrl = window.APP_CONFIG.getApiBaseUrl();
          const query = `?department=${encodeURIComponent(dept)}&year=${encodeURIComponent(year)}&semester=${encodeURIComponent(sem)}&section=${encodeURIComponent(sec)}`;
          const res = await fetch(`${baseUrl}/semester-marks${query}`);
          const json = await res.json();
          semesterMarksList = json.data || [];

          if (semesterMarksList.length === 0) {
            tbody.innerHTML = '<tr><td colspan="12" style="text-align:center; padding:2rem; color:var(--text-secondary);">No semester mark records found.</td></tr>';
            return;
          }

          tbody.innerHTML = semesterMarksList.map(m => `
            <tr>
              <td style="font-weight:700; color:var(--primary);">${m.studentRegisterNo}</td>
              <td style="font-weight:700; color:#1E3A8A;">${m.studentName || '-'}</td>
              <td>${m.subjectCode}</td>
              <td>${m.subjectName || '-'}</td>
              <td>${m.semester || 'Semester V'}</td>
              <td><span class="badge badge-primary">${m.grade || 'O'}</span></td>
              <td style="font-weight:700;">${m.marks || 95}</td>
              <td>${m.credits || 4}</td>
              <td>${m.gpa || 9.5}</td>
              <td>${m.cgpa || 9.2}</td>
              <td><span class="badge ${m.result === 'PASS' ? 'badge-success' : 'badge-warning'}">${m.result || 'PASS'}</span></td>
              <td>
                <div style="display:flex; gap:0.35rem;">
                  ${isFacultyOrAdmin ? `<button onclick="editSemesterMark('${m._id}')" class="btn-secondary" style="padding:0.35rem 0.6rem; font-size:0.75rem;" title="Edit"><i class="fa-solid fa-pen"></i></button>` : ''}
                  ${isFacultyOrAdmin ? `<button onclick="deleteSemesterMark('${m._id}')" class="btn-danger" style="padding:0.35rem 0.6rem; font-size:0.75rem;" title="Delete"><i class="fa-solid fa-trash"></i></button>` : ''}
                </div>
              </td>
            </tr>
          `).join('');

        } catch (err) {
          tbody.innerHTML = '<tr><td colspan="12" style="text-align:center; color:var(--error);">Failed to load semester grade sheet.</td></tr>';
        }
      };

      document.querySelectorAll('#semFilterDept, #semFilterYear, #semFilterSem, #semFilterSec').forEach(el => el.addEventListener('change', fetchSemesterMarks));

      document.getElementById('semesterMarkForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const marks = Number(document.getElementById('semMarks').value);
        if (marks > 100) return alert('Semester marks cannot exceed 100.');

        const id = document.getElementById('editSemDbId').value;
        const payload = {
          studentRegisterNo: document.getElementById('semRegNo').value,
          studentName: document.getElementById('semName').value,
          subjectCode: document.getElementById('semCode').value,
          subjectName: document.getElementById('semSubjectName').value,
          department: document.getElementById('semFilterDept').value !== 'All' ? document.getElementById('semFilterDept').value : 'AI & DS',
          year: document.getElementById('semFilterYear').value !== 'All' ? document.getElementById('semFilterYear').value : 'III Year',
          semester: document.getElementById('semFilterSem').value !== 'All' ? document.getElementById('semFilterSem').value : 'Semester V',
          section: document.getElementById('semFilterSec').value !== 'All' ? document.getElementById('semFilterSec').value : 'A',
          marks: marks,
          credits: Number(document.getElementById('semCredits').value),
          cgpa: Number(document.getElementById('semCgpa').value)
        };

        const baseUrl = window.APP_CONFIG.getApiBaseUrl();
        const token = localStorage.getItem('jp_dms_token');
        const url = id ? `${baseUrl}/semester-marks/${id}` : `${baseUrl}/semester-marks`;
        const method = id ? 'PUT' : 'POST';

        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        alert(data.message || 'Semester grade record saved!');
        modal.classList.remove('active');
        fetchSemesterMarks();
      });

      window.editSemesterMark = (id) => {
        const m = semesterMarksList.find(x => x._id === id);
        if (!m) return;

        document.getElementById('editSemDbId').value = m._id;
        document.getElementById('semRegNo').value = m.studentRegisterNo;
        document.getElementById('semName').value = m.studentName || '';
        document.getElementById('semCode').value = m.subjectCode;
        document.getElementById('semSubjectName').value = m.subjectName || '';
        document.getElementById('semMarks').value = m.marks || 0;
        document.getElementById('semCredits').value = m.credits || 4;
        document.getElementById('semCgpa').value = m.cgpa || 9.0;

        document.getElementById('semModalTitle').innerHTML = '<i class="fa-solid fa-user-pen" style="color: var(--primary);"></i> Edit Semester Grade Record';
        modal.classList.add('active');
      };

      window.deleteSemesterMark = async (id) => {
        if (!confirm('Delete this semester mark record?')) return;
        const baseUrl = window.APP_CONFIG.getApiBaseUrl();
        const token = localStorage.getItem('jp_dms_token');
        await fetch(`${baseUrl}/semester-marks/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        fetchSemesterMarks();
      };

      document.getElementById('exportSemMarksBtn').addEventListener('click', () => {
        if (!semesterMarksList.length) return alert('No semester marks to export.');
        exporter.exportToExcel('JP_College_SemesterMarks', semesterMarksList);
      });

      fetchSemesterMarks();
    });
  </script>
</body>
</html>
